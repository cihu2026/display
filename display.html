<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SimpleReserve 2.0 | 現場候位大螢幕</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #22d3ee;
            --accent: #facc15;
            --text: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* 介面佈局 */
        .container {
            display: grid;
            grid-template-rows: 100px 1fr 80px;
            height: 100vh;
        }

        /* 頂部：標題與時間 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--primary);
        }

        .logo { font-size: 2rem; font-weight: bold; color: var(--primary); }
        #clock { font-size: 1.5rem; font-family: monospace; }

        /* 主區域 */
        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px; padding: 30px;
        }

        /* 左側：大號碼 */
        .main-call {
            background: var(--card);
            border-radius: 30px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid var(--primary);
            position: relative;
        }

        .label { font-size: 3rem; margin-bottom: 20px; letter-spacing: 10px; }
        .number { 
            font-size: 25rem; font-weight: 900; line-height: 1;
            color: var(--primary); text-shadow: 0 0 30px rgba(34, 211, 238, 0.5);
        }

        /* 右側：準備區 */
        .side-list {
            background: var(--card);
            border-radius: 30px; padding: 30px;
            display: flex; flex-direction: column;
        }

        .side-title { 
            font-size: 2rem; text-align: center; 
            padding-bottom: 20px; border-bottom: 1px solid #444;
            color: var(--accent);
        }

        .wait-numbers {
            flex: 1; display: flex; flex-direction: column;
            justify-content: space-around; align-items: center;
            font-size: 5rem; font-weight: bold; color: rgba(255,255,255,0.6);
        }

        /* 底部走馬燈 */
        footer {
            background: #000; display: flex; align-items: center;
            white-space: nowrap; overflow: hidden;
        }

        .marquee {
            font-size: 1.8rem; animation: scroll 25s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 控制按鈕（滑鼠移入才顯示） */
        .controls {
            position: fixed; bottom: 90px; right: 20px;
            opacity: 0; transition: 0.3s;
        }
        body:hover .controls { opacity: 1; }
        
        button {
            padding: 10px 20px; cursor: pointer; border-radius: 5px;
            background: var(--primary); border: none; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">SimpleReserve 2.0</div>
        <div id="clock">00:00:00</div>
    </header>

    <main>
        <div class="main-call">
            <div class="label">請號碼到場</div>
            <div class="number" id="nowNum">--</div>
        </div>

        <div class="side-list">
            <div class="side-title">後續準備</div>
            <div class="wait-numbers" id="nextList">
                <div>--</div>
                <div>--</div>
                <div>--</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="marquee">
            📢 歡迎光臨！過號請重新取號。請保持社交距離，祝您用餐愉快！本系統由 GitHub Pages 提供服務。
        </div>
    </footer>
</div>

<div class="controls">
    <button onclick="testCall()">模擬叫號</button>
    <button onclick="toggleFS()">全螢幕模式</button>
</div>

<script>
    // 1. 更新時鐘
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', {hour12: false});
    }
    setInterval(updateClock, 1000);

    // 2. 語音叫號功能
    function speak(num) {
        const msg = new SpeechSynthesisUtterance(`請 ${num} 號到櫃檯報到`);
        msg.lang = 'zh-TW';
        msg.rate = 0.8; // 速度慢一點比較清楚
        window.speechSynthesis.speak(msg);
    }

    // 3. 更新畫面號碼
    let current = 0;
    function updateNumbers(num) {
        // 更新大號碼
        const nowEl = document.getElementById('nowNum');
        nowEl.innerText = num.toString().padStart(3, '0');
        
        // 更新右側預備號碼 (目前+1, +2, +3)
        const nextItems = document.getElementById('nextList').children;
        for(let i=0; i<3; i++) {
            nextItems[i].innerText = (num + i + 1).toString().padStart(3, '0');
        }

        // 觸發語音
        speak(num);
    }

    // 模擬用函數
    function testCall() {
        current++;
        updateNumbers(current);
    }

    // 全螢幕切換
    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // 初始化
    updateClock();
</script>

</body>
</html>
